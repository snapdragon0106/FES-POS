<!doctype html>
<html lang="ja">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>FES POS</title>
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      try {
        if (localStorage.getItem("theme") === "dark") {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
      // "Intelligent colour": pick a time-of-day bucket once, before
      // first paint, so the ambient background wash (light mode only)
      // starts life already tinted for the time of day rather than
      // flashing then changing. Never affects the accent colour used
      // for money/critical actions.
      try {
        var h = new Date().getHours();
        var bucket = h < 6 ? "night" : h < 11 ? "morning" : h < 17 ? "day" : h < 21 ? "evening" : "night";
        document.documentElement.setAttribute("data-daytime", bucket);
      } catch (e) {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
